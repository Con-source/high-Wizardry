<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Wizardry - Torn City</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1a1a; color: #e0e0e0; }
        .panel { background: #2a2a2a; border: 2px solid #8B0000; padding: 20px; margin: 10px 0; }
        .panel h2 { color: #DAA520; }
        .action-btn { background: #8B0000; color: #FFD700; width: 100%; }
        .action-btn:hover { background: #FF6347; }
        .loading { opacity: 0.6; pointer-events: none; }
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10000;
            max-width: 400px;
        }
        .notification {
            background: #2a2a2a;
            border-left: 4px solid #DAA520;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.3s ease;
        }
        .notification.show {
            opacity: 1;
            transform: translateX(0);
        }
        .notification-error { border-left-color: #FF6347; }
        .notification-success { border-left-color: #90EE90; }
        .notification-warning { border-left-color: #FFD700; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9000; }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-dialog { background: #2a2a2a; border: 2px solid #8B0000; padding: 20px; border-radius: 8px; max-width: 500px; }
        .modal-header { margin-bottom: 20px; }
        .modal-title { color: #DAA520; }
        .modal-close { background: none; border: none; color: #DAA520; font-size: 24px; cursor: pointer; }
        .modal-footer { margin-top: 20px; display: flex; gap: 10px; justify-content: flex-end; }
    </style>
</head>
<body>
    <!-- Main Game Container -->
    <div class="container-fluid">
        <div class="panel">
            <h1><i class="fas fa-hat-wizard"></i> High Wizardry - Torn City RPG</h1>
        </div>
        
        <div class="panel">
            <h2>Player Stats</h2>
            <p>Name: <span id="player-name">Apprentice</span></p>
            <p>Level: <span id="player-level">1</span></p>
            <p>Currency: <span id="currency-display">83 shillings, 4 pence</span></p>
        </div>
        
        <div id="game-content">
            <!-- Game content will be rendered here -->
        </div>
    </div>

    <!-- Script Loading Order (CRITICAL - Load in this exact order) -->
    <!-- 1. Configuration MUST load first -->
    <script src="jsjs/config.js"></script>
    
    <!-- 2. Core game module -->
    <script src="jsjs/game-core.js"></script>
    
    <!-- 3. UI module -->
    <script src="jsjs/ui.js"></script>
    
    <!-- 4. Player module (handles player data and UI updates) -->
    <script src="jsjs/player.js" defer></script>
    
    <!-- 5. Feature modules (these have graceful fallbacks if missing) -->
    <script src="jsjs/script.js" defer></script>
    
    <!-- 6. Initialize everything after all modules are loaded -->
    <script src="jsjs/main.js" defer></script>
    
    <!-- Optional modules that enhance gameplay (loaded after core) -->
    <script src="jsjs/locations.js" defer></script>
    <script src="jsjs/resources.js" defer></script>
    <script src="jsjs/travel.js" defer></script>
    <script src="jsjs/trade.js" defer></script>
    <script src="jsjs/auction.js" defer></script>
    <script src="jsjs/workshop.js" defer></script>
    <script src="jsjs/guilds.js" defer></script>
    <script src="jsjs/achievements.js" defer></script>
    <script src="jsjs/consumables.js" defer></script>
    <script src="jsjs/chat.js" defer></script>
    <script src="jsjs/community.js" defer></script>
    <script src="jsjs/black-market.js" defer></script>
    <script src="jsjs/admin.js" defer></script>
    <script src="jsjs/tutorial.js" defer></script>
    <script src="jsjs/actions.js" defer></script>
    <script src="jsjs/accessibility.js" defer></script>
    <script src="jsjs/performance.js" defer></script>
</body>
</html>
