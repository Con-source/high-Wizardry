<!DOCTYPE html>
<html lang="en">
<head>

    <title>High Wizardry - Torn City</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <p>Shillings: <span id="shillings">83</span></p>

    <script src="high-wizardry-ui.js"></script>
